# This workflow has been superseded by publish.yml
# which handles automated versioning, npm publishing, and GitHub Releases.
# Kept as a manual diagnostic tool — runs changeset status on demand.

name: Release Check (Manual)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm changeset status
